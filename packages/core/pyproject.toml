[build-system]
requires = ["hatchling>=1.5.0", "jupyterlab>=4.0.0,<5", "hatch-nodejs-version>=0.3.2", "hatch-jupyter-builder>=0.5"]
build-backend = "hatchling.build"

[project]
name = "jupyterlab-git-core"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
classifiers = [
    "Framework :: Jupyter",
    "Framework :: Jupyter :: JupyterLab",
    "Framework :: Jupyter :: JupyterLab :: 4",
    "Framework :: Jupyter :: JupyterLab :: Extensions",
    "Framework :: Jupyter :: JupyterLab :: Extensions :: Prebuilt",
    "License :: OSI Approved :: BSD License",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
dependencies = [
    "anyio",
    "nbformat",
    "packaging",
    "pexpect",
    "traitlets~=5.0",
]

dynamic = ["version", "description", "authors", "urls", "keywords"]

[project.optional-dependencies]
nbdime = [
    "nbdime~=4.0.1",
]
test = [
    "coverage",
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
]

[tool.hatch.version]
source = "nodejs"
path = "package.json"

[tool.hatch.metadata.hooks.nodejs]
fields = ["description", "authors", "urls"]
path = "package.json"

[tool.hatch.build.targets.sdist]
artifacts = ["jupyterlab_git_core/labextension"]
exclude = [".github", "binder"]

[tool.hatch.build.targets.wheel.shared-data]
"jupyterlab_git_core/labextension" = "share/jupyter/labextensions/@jupyterlab/git"
"install.json" = "share/jupyter/labextensions/@jupyterlab/git/install.json"

[tool.hatch.build.hooks.version]
path = "jupyterlab_git_core/_version.py"

[tool.hatch.build.hooks.jupyter-builder]
dependencies = ["hatch-jupyter-builder>=0.5"]
build-function = "hatch_jupyter_builder.npm_builder"
ensured-targets = [
    "jupyterlab_git_core/labextension/static/style.js",
    "jupyterlab_git_core/labextension/package.json",
]
skip-if-exists = ["jupyterlab_git_core/labextension/static/style.js"]

[tool.hatch.build.hooks.jupyter-builder.build-kwargs]
build_cmd = "build:prod"
npm = ["jlpm"]
path = "../../"

[tool.hatch.build.hooks.jupyter-builder.editable-build-kwargs]
build_cmd = "install:extension"
npm = ["jlpm"]
source_dir = "../../src"
build_dir = "jupyterlab_git_core/labextension"
path = "../../"
